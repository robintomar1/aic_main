# Override to evaluate the v9-act trained policy in the official two-container
# stack. Bind-mounts the local checkpoint dir into the model container and
# overrides the entrypoint args so aic_model loads my_policy.ros.RunACT.RunACT
# instead of the default CheatCode example.
#
# Run from `docker/`:
#   docker compose -f docker-compose.yaml -f docker-compose.runact.yaml up --build
#
# To eval a specific checkpoint step (instead of the `last` symlink):
#   AIC_ACT_CHECKPOINT_HOST=/root/aic_data/v9_act_build/runs/v9_act_v1/checkpoints/050000/pretrained_model \
#     docker compose -f docker-compose.yaml -f docker-compose.runact.yaml up --build
#
# Why an override file rather than baking the checkpoint into the image: the
# checkpoint is large (~hundreds of MB) and changes every training step.
# Mounting at run-time lets us swap checkpoints without rebuilds.
services:
  model:
    volumes:
      # Bind-mount the trained checkpoint dir read-only into the container.
      # Default points at the `last` symlink that lerobot updates each save_freq.
      - type: bind
        source: ${AIC_ACT_CHECKPOINT_HOST:-/root/aic_data/v9_act_build/runs/v9_act_v1/checkpoints/last/pretrained_model}
        target: /opt/aic_act_checkpoint
        read_only: true
    environment:
      AIC_ACT_CHECKPOINT: /opt/aic_act_checkpoint
      # Optional: cap inference budget per trial (default 30 s in RunACT.py)
      # AIC_ACT_TIMEOUT_S: 60
    command: ["--ros-args",
              "-p", "policy:=my_policy.ros.RunACT.RunACT",
              "-p", "use_sim_time:=true"]
